<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .user-info-box {
            text-align: center;
            padding: 20px 0;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #4080ff;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .user-id {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .verified-tag {
            color: #4CAF50;
            font-size: 14px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .menu-item {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-item:hover {
            background: #f8f9fa;
        }
        .logout-wrap {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }
        .logout-wrap .menu-item {
            width: calc(50% - 7.5px);
            background: #ff4444;
            color: #fff;
        }
    </style>
</head>
<body>

<!-- 我只在这里加了一段登录判断，其他完全没动！ -->
<script>
if(!localStorage.getItem('currentUser')){
  alert('请先登录');
  location.href='login.html';
}
</script>

    <header>
        <div class="container nav-box">
            <div class="logo">校园二手集市</div>
            <div class="nav-menu">
                <a href="index1.html">首页</a>
                <a href="index2.html">分类</a>
                <a href="index4.html">发布</a>
                <a id="userNav" href="">我的</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="user-info-box">
            <div class="avatar" id="avatar"></div>
            <div class="user-name" id="user-name">加载中...</div>
            <div class="user-id" id="user-id">学号：加载中</div>
            <div class="verified-tag">✅ 在校认证用户</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="location.href='index7.html'">我的发布</div>
            <div class="menu-item" onclick="location.href='index10.html'">我的收藏</div>
            <div class="menu-item" onclick="location.href='index9.html'">我的协商</div>
            <div class="menu-item" onclick="location.href='index11.html'">我的消息</div>
            <div class="menu-item" onclick="location.href='index6.html'">我的订单</div>
            <div class="menu-item" onclick="location.href='index8.html'">修改资料</div>
        </div>

        <div class="logout-wrap">
            <div class="menu-item" onclick="logout()">退出登录</div>
        </div>
    </main>

    <script src="js.js"></script>
    <script>
        window.onload = function () {
            let currentUser = localStorage.getItem("currentUser");
            if (!currentUser) {
                alert("请先登录");
                location.href = "login.html";
                return;
            }

            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(u => u.username === currentUser);
            let userInfo = JSON.parse(localStorage.getItem("userInfo_"+currentUser)) || {};
            let avatarUrl = localStorage.getItem("avatar_"+currentUser);

            if (avatarUrl) {
                document.getElementById("avatar").innerHTML = `<img src="${avatarUrl}" alt="头像">`;
            } else {
                document.getElementById("avatar").innerHTML = `<img src="img/avatar.jpg" alt="头像" onerror="this.style.display='none'; this.parentNode.innerText='${userInfo.nickname||'用'}">`;
            }

            document.getElementById("user-name").innerText = userInfo.nickname || user.username;
            document.getElementById("user-id").innerText = "学号：" + user.studentId;
        }

        function logout() {
            localStorage.removeItem("currentUser");
            alert("退出成功");
            location.href = "login.html";
        }
    </script>
</body>
</html>
