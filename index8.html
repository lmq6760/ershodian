<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改资料</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .back-btn {
            background-color: #4080ff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .back-btn:hover {
            background-color: #2967d8;
        }
        .avatar-box {
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #4080ff;
            color: white;
            font-size: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .save-btn {
            width: 100%;
            background-color: #4080ff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-box">
            <div class="logo">校园二手集市</div>
            <div class="nav-menu">
                <a href="index1.html">首页</a>
                <a href="index2.html">分类</a>
                <a href="index4.html">发布</a>
                <a href="index5.html">我的</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="order-box">
            <button class="back-btn" onclick="location.href='index5.html'">← 返回</button>
            <h2>修改资料</h2>

            <div class="avatar-box">
                <div class="avatar" id="avatar-preview" onclick="document.getElementById('avatar-input').click()"></div>
                <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="changeAvatar(event)">
            </div>

            <div class="form-group">
                <label>学号（不可修改）</label>
                <input type="text" id="studentId" disabled style="background:#f5f5f5">
            </div>

            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="nickname" placeholder="请输入昵称">
            </div>

            <div class="form-group">
                <label>联系方式</label>
                <input type="text" id="contact" placeholder="请输入联系方式">
            </div>

            <button class="save-btn" onclick="saveProfile()">保存修改</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem("currentUser");
        if (!currentUser) {
            alert("请先登录");
            location.href = "login.html";
        }

        window.onload = function () {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(u => u.username === currentUser);
            let userInfo = JSON.parse(localStorage.getItem("userInfo_"+currentUser)) || {};
            let avatarUrl = localStorage.getItem("avatar_"+currentUser);

            document.getElementById("studentId").value = user.studentId;
            document.getElementById("nickname").value = userInfo.nickname || "";
            document.getElementById("contact").value = userInfo.contact || "";

            if (avatarUrl) {
                document.getElementById("avatar-preview").innerHTML = `<img src="${avatarUrl}" alt="头像">`;
            } else {
                document.getElementById("avatar-preview").innerHTML = `<img src="img/avatar.jpg" alt="头像" onerror="this.style.display='none'; this.parentNode.innerText='${userInfo.nickname||'用'}">`;
            }
        };

        function changeAvatar(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                localStorage.setItem("avatar_"+currentUser, e.target.result);
                document.getElementById("avatar-preview").innerHTML = `<img src="${e.target.result}" alt="头像">`;
            };
            reader.readAsDataURL(file);
        }

        function saveProfile() {
            let userInfo = {
                nickname: document.getElementById("nickname").value,
                contact: document.getElementById("contact").value
            };
            localStorage.setItem("userInfo_"+currentUser, JSON.stringify(userInfo));
            alert("保存成功！");
            location.href = "index5.html";
        }
    </script>
</body>
</html>
