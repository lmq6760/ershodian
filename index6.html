<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .back-btn {
            background-color: #2D7DFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .back-btn:hover {
            background-color: #2967d8;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-box">
            <div class="logo">校园二手集市</div>
            <div class="nav-menu">
                <a href="index1.html">首页</a>
                <a href="index2.html">分类</a>
                <a href="index4.html">发布</a>
                <a href="index5.html">我的</a>
            </div>
        </div>
    </header>

    <!-- 只改这一行：div → main -->
    <main class="container">
        <div class="publish-form">
            <button class="back-btn" onclick="location.href='index5.html'">← 返回</button>
            <h2>我的订单</h2>
            <div id="order-list"></div>
        </div>
    </main>

    <script>
        function renderOrders() {
            const orders = JSON.parse(localStorage.getItem("orders")) || [];
            const orderList = document.getElementById("order-list");
            
            if (orders.length === 0) {
                orderList.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:120px;color:#999;">暂无订单</div>`;
                return;
            }
            
            let html = "";
            orders.forEach(order => {
                const seller = order.goods.seller || {nickname: "未知卖家", contact: "无联系方式"};
                const buyer = order.buyer || {nickname: "未知买家", contact: "无联系方式"};

                let statusColor = "#666";
                if (order.status === "待支付" || order.status === "待确认") {
                    statusColor = "#ff4444";
                } else if (order.status === "已完成") {
                    statusColor = "#009933";
                } else if (order.status === "已取消") {
                    statusColor = "#888888";
                }

                html += `
                <div style="margin:15px 0;padding:15px;border:1px solid #eee;border-radius:8px;">
                    <div style="display:flex;align-items:center;gap:15px;margin-bottom:15px;">
                        <img src="${order.goods.img}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;">
                        <div>
                            <h4>${order.goods.name}</h4>
                            <p>价格：¥${order.goods.price}</p>
                            <p>订单状态：<span style="color:${statusColor}">${order.status}</span></p>
                        </div>
                    </div>
                    
                    <div style="margin:10px 0;">
                        <p><strong>卖家：</strong>${seller.nickname} (${seller.contact})</p>
                        <p><strong>买家：</strong>${buyer.nickname} (${buyer.contact})</p>
                    </div>
                    
                    <p>创建时间：${order.createTime}</p>
                    
                    <div style="margin-top:10px;">
                        ${order.status === '待支付' || order.status === '待确认' ? `
                        <button onclick="updateOrderStatus(${order.id}, '已完成')" style="margin-right:10px;">确定支付</button>
                        <button onclick="updateOrderStatus(${order.id}, '已取消')" style="margin-right:10px;">取消订单</button>
                        ` : ''}
                        <button onclick="deleteOrder(${order.id})">删除订单</button>
                    </div>
                </div>
                `;
            });
            
            orderList.innerHTML = html;
        }

        function updateOrderStatus(orderId, status) {
            let orders = JSON.parse(localStorage.getItem("orders")) || [];
            const index = orders.findIndex(o => o.id === orderId);
            if (index > -1) {
                orders[index].status = status;
                localStorage.setItem("orders", JSON.stringify(orders));
                renderOrders();
            }
        }

        function deleteOrder(orderId) {
            if (confirm('确定要删除这个订单吗？')) {
                let orders = JSON.parse(localStorage.getItem("orders")) || [];
                orders = orders.filter(o => o.id !== orderId);
                localStorage.setItem("orders", JSON.stringify(orders));
                renderOrders();
            }
        }

        window.onload = renderOrders;
    </script>
</body>
</html>
