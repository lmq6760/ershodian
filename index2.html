<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品分类</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container nav-box">
            <div class="logo">校园二手集市</div>
            <div class="nav-menu">
                <a href="index1.html">首页</a>
                <a href="index2.html">分类</a>
                <a href="index4.html">发布</a>
                <a id="userNav" href="">我的</a>
            </div>
        </div>
    </header>

    <!-- 用 main 包主内容，符合 HTML5 语义化 -->
    <main class="container">
        <div class="filter-bar">
            <select id="filter-cate">
                <option value="">全部分类</option>
                <option value="教材书籍">教材书籍</option>
                <option value="数码电子">数码电子</option>
                <option value="生活用品">生活用品</option>
            </select>
            
            <input type="number" id="min-price" placeholder="最低价">
            <input type="number" id="max-price" placeholder="最高价">
            
            <select id="filter-level">
                <option value="">全部成色</option>
                <option value="全新">全新</option>
                <option value="95新">95新</option>
                <option value="9成新">9成新</option>
                <option value="8成新">8成新</option>
            </select>
            
            <select id="sort-type">
                <option value="new">最新发布</option>
                <option value="old">最早发布</option>
                <option value="price-up">价格升序</option>
                <option value="price-down">价格降序</option>
            </select>
            
            <button class="filter-btn" onclick="filterGoods()">筛选</button>
        </div>

        <div id="filter-goods" class="goods-list"></div>
    </main>

    <script src="js.js"></script>
    <script>
        window.onload = function() {
            filterGoods();
        };
    </script>
</body>
</html>
